{% extends "base.html" %}

{% block titulo %} Cadastro {% endblock %}

{% block conteudo %} 
    <h1>Preencha o formulário com as informações do problema</h1>
    
    <h1>Cadastro de Buracos</h1>

    <form action="{{url_for('cadastrar_buraco')}}" method="post">
        <label for="rua">Rua</label>
        <input type="text" name="rua" id="rua" placeholder="nome da rua" required>
        <label for="bairro">Bairro</label>
        <input type="text" name="bairro" id="bairro" placeholder="nome do bairro" required>
        <label for="cidade">Cidade</label>
        <input type="text" name="cidade" id="cidade" placeholder="nome da cidade" required>
        <label for="gravidade">Gravidade</label>
        <select  name="gravidade" id="gravidade" required>
            <option value="">Selecione...</option>
            <option value="Leve">Leve</option>
            <option value="Médio">Médio</option>
            <option value="Urgente">Urgente</option>
        </select>

        <button type="submit">Finalizar Cadastror</button>
    </form>

<a href="{{ url_for('home') }}">Voltar para Home</a>

{% endblock %}
